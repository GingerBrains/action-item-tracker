services:
  postgres:
    image: postgres:16-alpine
    container_name: action-tracker-db
    environment:
      POSTGRES_DB: actiontracker
      POSTGRES_USER: actiontracker
      POSTGRES_PASSWORD: actiontracker_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:































































































































































































































































































