services:
  db:
    image: postgres:16-alpine
    container_name: action-tracker-db
    environment:
      POSTGRES_DB: actiontracker
      POSTGRES_USER: actiontracker
      POSTGRES_PASSWORD: actiontracker_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: action-tracker-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/actiontracker
      SPRING_DATASOURCE_USERNAME: actiontracker
      SPRING_DATASOURCE_PASSWORD: actiontracker_dev
      JWT_SECRET_KEY: your-very-long-secret-key-that-is-at-least-256-bits-long-for-security
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - db

volumes:
  postgres_data: