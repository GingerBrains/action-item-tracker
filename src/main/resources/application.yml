spring:
    application:
        name: action-item-tracker
    datasource:
        url: jdbc:postgresql://localhost:5432/actiontracker
        username: actiontracker
        password: actiontracker_dev
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        open-in-view: false

app:
    jwt:
        secret: ${JWT_SECRET_KEY:your-very-long-secret-key-that-is-at-least-256-bits-long-for-security}
        expiration-ms: ${JWT_EXPIRATION_MS:900000}
        refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    admin:
        email: ${ADMIN_EMAIL:admin@actiontracker.com}
        password: ${ADMIN_PASSWORD:changeme123}
        fullName: ${ADMIN_FULL_NAME:System Administrator}

logging:
    level:
        org.springframework.security: DEBUG